<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅방</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        button { padding: 8px; margin: 4px; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-top: 10px; }
        .message { display: flex; align-items: flex-end; gap: 8px; margin: 8px 0; }
        .message.mine { flex-direction: row-reverse; }
        .message img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .message.mine img { display: none; }
        .message-body { display: flex; flex-direction: column; max-width: 70%; }
        .message.mine .message-body { align-items: flex-end; }
        .nickname { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
        .message-row { display: flex; align-items: flex-end; gap: 4px; }
        .message.mine .message-row { flex-direction: row-reverse; }
        .bubble { background: #f0f0f0; padding: 8px 12px; border-radius: 12px; word-break: break-word; }
        .message.mine .bubble { background: #fee500; }
        .unread-count { font-size: 11px; color: #f5a623; white-space: nowrap; }
        .system-msg { text-align: center; color: #999; font-size: 13px; margin: 8px 0; }
        .input-area { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
        .input-area input[type="text"] { flex: 1; padding: 8px; }
        #file-preview { font-size: 13px; color: #555; display: none; align-items: center; gap: 6px; margin-top: 4px; }
        #header { display: flex; justify-content: space-between; align-items: center; }
        #context-menu, #notice-context-menu { display: none; position: fixed; background: white; border: 1px solid #ccc; border-radius: 6px; box-shadow: 2px 2px 6px rgba(0,0,0,0.15); z-index: 999; }
        #context-menu div, #notice-context-menu div { padding: 8px 16px; cursor: pointer; font-size: 14px; }
        #context-menu div:hover, #notice-context-menu div:hover { background: #f5f5f5; }
        #notice-bar { display: none; align-items: center; justify-content: space-between; background: #fff8e1; border-left: 3px solid #f5a623; padding: 8px 12px; margin-top: 8px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        #reply-preview { display: none; align-items: center; gap: 8px; background: #f0f0f0; border-left: 3px solid #f5a623; padding: 6px 10px; margin-top: 4px; border-radius: 4px; font-size: 13px; }
        #reply-preview .reply-text { flex: 1; color: #555; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .reply-quote { background: rgba(0,0,0,0.05); border-left: 3px solid #aaa; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #666; margin-bottom: 4px; }
        #image-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; cursor:zoom-out; }
        #image-overlay img, #image-overlay video { max-width:90vw; max-height:90vh; border-radius:8px; object-fit:contain; }
        #file-context-menu { display:none; position:fixed; background:white; border:1px solid #ccc; border-radius:6px; box-shadow:2px 2px 6px rgba(0,0,0,0.15); z-index:999; }
        #file-context-menu div { padding:8px 16px; cursor:pointer; font-size:14px; }
        #file-context-menu div:hover { background:#f5f5f5; }
    </style>
</head>
<body>

<div id="header">
    <div>
        <a href="javascript:history.back()">← 뒤로</a>
        <strong id="roomTitle" style="margin-left: 12px;">채팅방</strong>
    </div>
    <button onclick="leaveRoom()" style="color:red;">나가기</button>
</div>

<div id="image-overlay" onclick="closeLightbox()"></div>

<div id="file-context-menu">
    <div onclick="downloadCurrentFile()">다운로드</div>
</div>

<div id="notice-bar">
    <span>📌 <span id="notice-text"></span></span>
</div>

<div id="messages"></div>

<div id="notice-context-menu">
    <div onclick="viewNotice()">보기</div>
    <div onclick="deleteNotice()">삭제</div>
</div>

<div id="context-menu">
    <div onclick="startReply()">답장</div>
    <div id="edit-menu-item" onclick="startEdit()" style="display:none;">수정</div>
    <div onclick="setNotice()">공지</div>
    <div id="delete-all-menu-item" onclick="deleteForAll()" style="display:none;">모두에게서 삭제</div>
    <div onclick="deleteForMe()">나에게서만 삭제</div>
</div>
<div id="reply-preview">
    <span class="reply-text" id="reply-preview-text"></span>
    <button onclick="cancelReply()" style="font-size:12px;">✕</button>
</div>
<div id="file-preview">
    <span id="file-name"></span>
    <button onclick="cancelFile()" style="font-size:12px;">✕</button>
</div>
<div class="input-area">
    <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none" onchange="onFileSelected()"/>
    <button onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="text" id="content" placeholder="메시지 입력" onkeydown="if(event.key==='Enter') send()"/>
    <button onclick="send()">전송</button>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const chatRoomId = params.get('chatRoomId');
    const myUserId = getMyUserId(token);
    let stompClient = null;
    let replyToMsg = null;

    function getMyUserId(token) {
        try {
            const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            return payload.userId;
        } catch(e) { return null; }
    }

    let currentFileUrl = null;

    // 컨텍스트 메뉴 닫기
    document.addEventListener('click', () => {
        document.getElementById('context-menu').style.display = 'none';
        document.getElementById('notice-context-menu').style.display = 'none';
        document.getElementById('file-context-menu').style.display = 'none';
    });

    // 공지 우클릭
    document.getElementById('notice-bar').addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const menu = document.getElementById('notice-context-menu');
        menu.style.display = 'block';
        menu.style.left = e.clientX + 'px';
        menu.style.top = e.clientY + 'px';
    });

    window.onload = () => {
        document.getElementById('roomTitle').textContent = '채팅방 #' + chatRoomId;
        loadHistory();
        loadNotice();
        connectWebSocket();
    };

    function loadHistory() {
        fetch(`/chat/${chatRoomId}/messages`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(res => {
            if (res.data) {
                res.data.forEach(msg => addMessage(msg));
                scrollToBottom();
            }
        })
        .catch(err => console.error('내역 조회 실패:', err));
    }

    function connectWebSocket() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect(
            { Authorization: 'Bearer ' + token },
            () => {
                stompClient.subscribe('/topic/chat/' + chatRoomId, message => {
                    const body = JSON.parse(message.body);
                    if (body.type === 'READ') {
                        if (body.userId !== myUserId) {
                            document.querySelectorAll('.unread-count').forEach(el => el.style.display = 'none');
                        }
                    } else if (body.type === 'EDIT') {
                        const msgEl = document.getElementById('msg-' + body.chatMsgId);
                        if (msgEl) {
                            const bubble = msgEl.querySelector('.bubble');
                            const replyQuoteHtml = bubble.dataset.replyQuote !== undefined
                                ? bubble.dataset.replyQuote
                                : (bubble.querySelector('.reply-quote')?.outerHTML || '');
                            bubble.innerHTML = replyQuoteHtml + escapeHtml(body.content) +
                                ' <span style="font-size:11px; color:#999;">(수정됨)</span>';
                            bubble.dataset.content = body.content;
                            bubble.dataset.replyQuote = replyQuoteHtml;
                        }
                    } else if (body.type === 'DELETE') {
                        document.getElementById('msg-' + body.chatMsgId)?.remove();
                    } else if (body.type === 'NOTICE_SET') {
                        showNoticeBar({ chatMsgId: body.chatMsgId, content: body.content });
                    } else if (body.chatMsgId) {
                        addMessage(body);
                        scrollToBottom();
                    } else {
                        addSystemMsg(body.content);
                        scrollToBottom();
                    }
                });
            },
            err => console.error('WebSocket 연결 실패:', err)
        );
    }

    function onFileSelected() {
        const files = document.getElementById('fileInput').files;
        if (!files.length) return;
        const names = Array.from(files).map(f => f.name).join(', ');
        document.getElementById('file-name').textContent = `${files.length}개: ${names}`;
        document.getElementById('file-preview').style.display = 'flex';
        document.getElementById('content').disabled = true;
        document.getElementById('content').placeholder = '파일 전송 중에는 텍스트를 입력할 수 없습니다.';
    }

    function cancelFile() {
        document.getElementById('fileInput').value = '';
        document.getElementById('file-preview').style.display = 'none';
        document.getElementById('content').disabled = false;
        document.getElementById('content').placeholder = '메시지 입력';
    }

    function send() {
        const files = document.getElementById('fileInput').files;
        if (files.length > 0) {
            sendFile(files);
        } else {
            sendMessage();
        }
    }

    function startReply() {
        const menu = document.getElementById('context-menu');
        menu.style.display = 'none';
        document.getElementById('reply-preview').style.display = 'flex';
        document.getElementById('reply-preview-text').textContent =
            `${replyToMsg.nickname}: ${replyToMsg.content || '파일'}`;
        document.getElementById('content').focus();
    }

    function cancelReply() {
        replyToMsg = null;
        document.getElementById('reply-preview').style.display = 'none';
        document.getElementById('reply-preview-text').textContent = '';
    }

    function sendMessage() {
        const content = document.getElementById('content').value.trim();
        if (!content || !stompClient) return;

        stompClient.send('/app/send/' + chatRoomId, {}, JSON.stringify({
            content: content,
            msgType: 'TEXT',
            replyToMsgId: replyToMsg ? replyToMsg.chatMsgId : null
        }));

        document.getElementById('content').value = '';
        cancelReply();
    }

    function sendFile(files) {
        const msgType = files[0].type.startsWith('video/') ? 'VIDEO' : 'IMAGE';
        const formData = new FormData();
        Array.from(files).forEach(f => formData.append('files', f));
        formData.append('msgType', msgType);
        if (replyToMsg) formData.append('replyToMsgId', replyToMsg.chatMsgId);

        fetch(`/chat/${chatRoomId}/file`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        })
        .then(() => cancelFile())
        .catch(err => alert('파일 전송 실패: ' + err));
    }

    function leaveRoom() {
        if (!confirm('채팅방을 나가시겠습니까?')) return;

        fetch(`/chat/${chatRoomId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(() => location.href = '/chat-rooms.html')
        .catch(err => alert('나가기 실패: ' + err));
    }

    function addMessage(msg) {
        const isMine = msg.userId === myUserId;
        const div = document.createElement('div');
        div.className = 'message' + (isMine ? ' mine' : '');
        div.id = 'msg-' + msg.chatMsgId;
        div.innerHTML = `
            <img src="${msg.profileImageUrl || '/images/profile-images/default.png'}"
                 onerror="this.src='/images/profile-images/default.png'"/>
            <div class="message-body">
                ${!isMine ? `<div class="nickname">${msg.nickname}</div>` : ''}
                <div class="message-row">
                    <div class="bubble">
                        ${msg.replyToNickname ? `
                            <div class="reply-quote" style="cursor:pointer;" onclick="scrollToMsg(${msg.replyToMsgId})">${msg.replyToNickname}: ${msg.replyToContent || '파일'}</div>
                        ` : ''}
                        ${msg.fileUrls && msg.fileUrls.length > 0
                            ? msg.fileUrls.map(url =>
                                msg.msgType === 'VIDEO'
                                    ? `<video src="${url}" controls class="file-media" style="max-width:200px; display:block; margin:2px 0; cursor:zoom-in;"></video>`
                                    : `<img src="${url}" class="file-media" style="max-width:200px; display:block; margin:2px 0; border-radius:8px; cursor:zoom-in;"/>`
                              ).join('')
                            : escapeHtml(msg.content || '') + (msg.edited ? ' <span style="font-size:11px; color:#999;">(수정됨)</span>' : '')}
                    </div>
                    ${isMine && msg.unreadCount > 0
                        ? `<div class="unread-count">${msg.unreadCount}</div>`
                        : ''}
                </div>
            </div>
        `;

        // 우클릭 시 컨텍스트 메뉴
        div.querySelector('.bubble').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            replyToMsg = msg;
            document.getElementById('edit-menu-item').style.display =
                (isMine && msg.msgType === 'TEXT') ? 'block' : 'none';
            document.getElementById('delete-all-menu-item').style.display =
                isMine ? 'block' : 'none';
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
        });

        document.getElementById('messages').appendChild(div);

        div.querySelectorAll('.file-media').forEach(el => {
            el.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                openLightbox(el.src, el.tagName.toLowerCase());
            });
            el.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                currentFileUrl = new URL(el.src).pathname;
                const menu = document.getElementById('file-context-menu');
                menu.style.display = 'block';
                menu.style.left = e.clientX + 'px';
                menu.style.top = e.clientY + 'px';
            });
        });
    }

    function addSystemMsg(content) {
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.textContent = content;
        document.getElementById('messages').appendChild(div);
    }

    function startEdit() {
        document.getElementById('context-menu').style.display = 'none';
        const msgEl = document.getElementById('msg-' + replyToMsg.chatMsgId);
        const bubble = msgEl.querySelector('.bubble');
        bubble.dataset.original = bubble.innerHTML;
        bubble.dataset.replyQuote = bubble.querySelector('.reply-quote')?.outerHTML || '';

        const currentContent = bubble.dataset.content !== undefined
            ? bubble.dataset.content
            : replyToMsg.content || '';

        bubble.innerHTML = `
            <input type="text" id="edit-input" value="${escapeHtml(currentContent)}"
                style="width:100%; padding:4px; box-sizing:border-box; border-radius:6px; border:1px solid #ccc;"/>
            <div style="margin-top:4px; display:flex; gap:4px; justify-content:flex-end;">
                <button onclick="saveEdit(${replyToMsg.chatMsgId})" style="font-size:12px;">저장</button>
                <button onclick="cancelEdit(${replyToMsg.chatMsgId})" style="font-size:12px;">취소</button>
            </div>
        `;
        document.getElementById('edit-input').focus();
    }

    function cancelEdit(chatMsgId) {
        const msgEl = document.getElementById('msg-' + chatMsgId);
        const bubble = msgEl.querySelector('.bubble');
        bubble.innerHTML = bubble.dataset.original;
        delete bubble.dataset.original;
    }

    function saveEdit(chatMsgId) {
        const newContent = document.getElementById('edit-input').value.trim();
        if (!newContent) return;

        fetch(`/chat/${chatRoomId}/messages/${chatMsgId}`, {
            method: 'PUT',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ content: newContent })
        })
        .catch(err => alert('수정 실패: ' + err));
    }

    let currentNotice = null;

    function loadNotice() {
        fetch(`/chat/${chatRoomId}/notice`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(res => { if (res.data) showNoticeBar(res.data); })
        .catch(err => console.error('공지 조회 실패:', err));
    }

    function showNoticeBar(notice) {
        currentNotice = notice;
        document.getElementById('notice-text').textContent = notice.content;
        document.getElementById('notice-bar').style.display = 'flex';
    }

    function hideNoticeBar() {
        currentNotice = null;
        document.getElementById('notice-bar').style.display = 'none';
    }

    function deleteForAll() {
        document.getElementById('context-menu').style.display = 'none';
        if (!confirm('모두에게서 삭제하시겠습니까?')) return;
        const chatMsgId = replyToMsg.chatMsgId;
        replyToMsg = null;
        fetch(`/chat/${chatRoomId}/messages/${chatMsgId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .catch(err => alert('삭제 실패: ' + err));
    }

    function deleteForMe() {
        document.getElementById('context-menu').style.display = 'none';
        const chatMsgId = replyToMsg.chatMsgId;
        replyToMsg = null;
        fetch(`/chat/${chatRoomId}/messages/${chatMsgId}/me`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(() => document.getElementById('msg-' + chatMsgId)?.remove())
        .catch(err => alert('삭제 실패: ' + err));
    }

    function setNotice() {
        document.getElementById('context-menu').style.display = 'none';
        fetch(`/chat/${chatRoomId}/notice?chatMsgId=${replyToMsg.chatMsgId}`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .catch(err => alert('공지 설정 실패: ' + err));
    }

    function viewNotice() {
        document.getElementById('notice-context-menu').style.display = 'none';
        if (!currentNotice) return;
        const msgEl = document.getElementById('msg-' + currentNotice.chatMsgId);
        if (msgEl) msgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function deleteNotice() {
        document.getElementById('notice-context-menu').style.display = 'none';
        fetch(`/chat/${chatRoomId}/notice`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(() => hideNoticeBar())
        .catch(err => alert('공지 삭제 실패: ' + err));
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }

    function scrollToMsg(chatMsgId) {
        const msgEl = document.getElementById('msg-' + chatMsgId);
        if (msgEl) msgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function openLightbox(src, tagName) {
        const overlay = document.getElementById('image-overlay');
        overlay.innerHTML = tagName === 'video'
            ? `<video src="${src}" controls autoplay style="max-width:90vw; max-height:90vh; border-radius:8px;"></video>`
            : `<img src="${src}" style="max-width:90vw; max-height:90vh; border-radius:8px; object-fit:contain;"/>`;
        overlay.style.display = 'flex';
    }

    function closeLightbox() {
        const overlay = document.getElementById('image-overlay');
        overlay.style.display = 'none';
        overlay.innerHTML = '';
    }

    function downloadCurrentFile() {
        document.getElementById('file-context-menu').style.display = 'none';
        if (!currentFileUrl) return;

        fetch(`/chat/files/download?fileUrl=${encodeURIComponent(currentFileUrl)}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => {
            const disposition = res.headers.get('Content-Disposition') || '';
            const match = disposition.match(/filename="(.+)"/);
            const filename = match ? match[1] : currentFileUrl.split('/').pop();
            return res.blob().then(blob => ({ blob, filename }));
        })
        .then(({ blob, filename }) => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        })
        .catch(err => alert('다운로드 실패: ' + err));
    }

    function scrollToBottom() {
        const el = document.getElementById('messages');
        el.scrollTop = el.scrollHeight;
    }
</script>
</body>
</html>
