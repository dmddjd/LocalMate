<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        input, button { padding: 8px; margin: 4px; }
        input { width: 300px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-top: 10px; }
        .message { margin: 4px 0; }
    </style>
</head>
<body>
    <h2>채팅 테스트</h2>

    <div>
        <input type="text" id="token" placeholder="JWT 토큰 입력" />
        <input type="number" id="chatRoomId" placeholder="채팅방 ID" />
        <button onclick="connect()">연결</button>
        <button onclick="disconnect()">연결 해제</button>
    </div>

    <div>
        <input type="text" id="content" placeholder="메시지 입력" />
        <button onclick="sendMessage()">전송</button>
    </div>

    <div id="messages"></div>

    <script>
        let stompClient = null;

        function connect() {
            const token = document.getElementById('token').value;
            const chatRoomId = document.getElementById('chatRoomId').value;

            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect(
                { Authorization: 'Bearer ' + token },
                function () {
                    addMessage('[연결 성공]');
                    stompClient.subscribe('/topic/chat/' + chatRoomId, function (message) {
                        const body = JSON.parse(message.body);
                        addMessage('[' + body.nickname + ']: ' + body.content);
                    });
                },
                function (error) {
                    addMessage('[연결 실패] ' + error);
                }
            );
        }

        function disconnect() {
            if (stompClient) {
                stompClient.disconnect();
                addMessage('[연결 해제]');
            }
        }

        function sendMessage() {
            const chatRoomId = document.getElementById('chatRoomId').value;
            const content = document.getElementById('content').value;

            stompClient.send('/app/chat/' + chatRoomId, {}, JSON.stringify({
                content: content,
                msgType: 'TEXT'
            }));

            document.getElementById('content').value = '';
        }

        function addMessage(text) {
            const div = document.createElement('div');
            div.className = 'message';
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
        }
    </script>
</body>
</html>
