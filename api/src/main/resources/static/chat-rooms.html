<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅방 목록</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        input, button { padding: 8px; margin: 4px; }
        input { width: 300px; }
        #roomList { margin-top: 16px; }
        .room-item {
            display: flex; align-items: center; gap: 12px;
            border: 1px solid #ccc; border-radius: 8px;
            padding: 12px; margin-bottom: 8px; cursor: pointer;
        }
        .room-item:hover { background: #f5f5f5; }
        .room-item img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .room-info { flex: 1; }
        .room-info .nickname { font-weight: bold; }
        .room-info .last-msg { color: #666; font-size: 13px; margin-top: 4px; }
        .unread {
            background: #ff3b30; color: white;
            border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
<h2>채팅방 목록</h2>

<div>
    <input type="text" id="token" placeholder="JWT 토큰 입력"/>
    <button onclick="loadRooms()">목록 조회</button>
</div>

<div id="roomList"></div>

<script>
    function loadRooms() {
        const token = document.getElementById('token').value;

        fetch('/chat/rooms', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(res => {
            const list = document.getElementById('roomList');
            list.innerHTML = '';

            if (!res.data || res.data.length === 0) {
                list.innerHTML = '<p>채팅방이 없습니다.</p>';
                return;
            }

            res.data.forEach(room => {
                const item = document.createElement('div');
                item.className = 'room-item';
                item.innerHTML = `
                    <img src="${room.opponentProfileImage || '/images/profile-images/default.png'}"
                         onerror="this.src='/images/profile-images/default.png'"/>
                    <div class="room-info">
                        <div class="nickname">${room.opponentNickname || '알 수 없음'}</div>
                        <div class="last-msg">${room.lastMsg || '메시지가 없습니다.'}</div>
                    </div>
                    ${room.unreadMsgCount > 0
                        ? `<div class="unread">${room.unreadMsgCount}</div>`
                        : ''}
                `;
                item.onclick = () => {
                    location.href = `/chat-room.html?chatRoomId=${room.chatRoomId}&token=${token}`;
                };
                list.appendChild(item);
            });
        })
        .catch(err => alert('조회 실패: ' + err));
    }
</script>
</body>
</html>
