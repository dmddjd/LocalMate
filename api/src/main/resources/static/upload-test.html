<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로필 수정 테스트</title>
</head>
<body>
    <h2>프로필 수정 테스트</h2>

    <p>로그인 상태: <span id="loginStatus">확인 중...</span></p>
    <a href="/login-test.html">로그인 페이지로 이동</a>
    <hr>

    <div>
        <label>닉네임</label><br>
        <input type="text" id="nickname" placeholder="닉네임 입력"/>
    </div>
    <br>
    <div>
        <label>상태 메시지</label><br>
        <input type="text" id="statusMessage" placeholder="상태 메시지 입력"/>
    </div>
    <br>
    <div>
        <label>로컬 모드</label><br>
        <input type="checkbox" id="localMode"/> 활성화
    </div>
    <br>
    <div>
        <label>성격 ID (쉼표로 구분)</label><br>
        <input type="text" id="personalityIds" placeholder="예: 1,2,3"/>
    </div>
    <br>
    <div>
        <label>프로필 사진 (선택)</label><br>
        <input type="file" id="image" accept="image/*"/>
    </div>
    <br>
    <button onclick="updateProfile()">수정</button>

    <h3>응답</h3>
    <pre id="result"></pre>

    <script>
        const token = localStorage.getItem('token');
        document.getElementById('loginStatus').textContent = token ? '로그인됨' : '로그인 안됨';

        async function updateProfile() {
            if (!token) {
                alert('먼저 로그인해주세요.');
                window.location.href = '/login-test.html';
                return;
            }

            const data = {
                nickname: document.getElementById('nickname').value || null,
                statusMessage: document.getElementById('statusMessage').value,
                localMode: document.getElementById('localMode').checked,
                personalityIds: document.getElementById('personalityIds').value
                    ? document.getElementById('personalityIds').value.split(',').map(Number)
                    : []
            };

            const formData = new FormData();
            formData.append('data', new Blob([JSON.stringify(data)], { type: 'application/json' }));

            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            const response = await fetch('/user/profile', {
                method: 'PATCH',
                headers: {
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            });

            const result = await response.json();
            document.getElementById('result').textContent = JSON.stringify(result, null, 2);
        }
    </script>
</body>
</html>
